<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interlinear Bible</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  header {
    background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 0;
  }
  header .container {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 20px; color: #58a6ff; white-space: nowrap; }

  .search-form { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
  .search-form select[name="book"]    { flex: 0 1 140px; }
  .search-form select[name="chapter"] { flex: 0 1 80px; }
  .search-form select[name="verse"]   { flex: 0 1 80px; }
  .search-form select[name="verseEnd"] { flex: 0 1 80px; }
  .search-form input, .search-form select, .search-form button {
    padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #0d1117; color: #e6edf3; font-size: 14px;
  }
  .search-form input:focus, .search-form select:focus { outline: none; border-color: #58a6ff; }
  .search-form select { cursor: pointer; flex: 0 1 160px; }
  .search-form optgroup { font-style: normal; font-weight: 600; color: #8b949e; }
  .search-form option.ot-book { color: #d2a8ff; }
  .search-form option.nt-book { color: #7ee787; }
  .search-form button {
    background: #238636; border-color: #2ea043; cursor: pointer;
    font-weight: 600;
  }
  .search-form button:hover { background: #2ea043; }
  .search-form input { flex: 0 1 160px; }
  .search-form input[name="chapter"] { flex: 0 1 80px; }
  .search-form input[name="verse"] { flex: 0 1 100px; }

  .error { color: #f85149; padding: 12px; background: #2d1215; border-radius: 6px; margin: 16px 0; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }

  .verse-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    margin: 16px 0;
  }
  .verse-header {
    padding: 12px 16px; border-bottom: 1px solid #30363d;
    display: flex; justify-content: space-between; align-items: center;
  }
  .verse-ref { font-weight: 600; font-size: 16px; color: #58a6ff; }
  .verse-lang { font-size: 12px; color: #8b949e; }

  .interlinear-table-wrapper {
    overflow-x: auto; margin-top: -1px;
  }
  .interlinear-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .interlinear-table th {
    padding: 8px 6px; text-align: center; font-weight: 500; color: #8b949e;
    border-right: 1px solid #21262d; font-size: 11px; min-width: 60px;
  }
  .interlinear-table td {
    padding: 6px; text-align: center; border-right: 1px solid #21262d;
    white-space: nowrap; max-width: 120px;
  }
  .interlinear-table td.row-wrap {
    white-space: normal; word-break: break-word; max-width: 140px;
  }
  .interlinear-table tr:last-child td { border-bottom: none; }
  .interlinear-table th:last-child, .interlinear-table td:last-child { border-right: none; }

  .row-strong { color: #d2a8ff; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; }
  .row-translit { color: #79c0ff; font-style: italic; font-size: 12px; }
  .row-original { font-size: 16px; font-weight: 500; }
  .row-original.greek { font-family: 'Noto Sans', 'Cardo', serif; }
  .row-original.hebrew { font-family: 'Noto Sans Hebrew', 'SBL Hebrew', serif; direction: rtl; }
  .row-gloss { color: #e6edf3; font-size: 12px; }
  .row-grammar { color: #7ee787; font-family: 'SF Mono', Monaco, monospace; font-size: 10px; }

  .kjv-text {
    padding: 12px 16px; border-top: 1px solid #30363d;
    font-size: 14px; line-height: 1.6; color: #8b949e;
    word-wrap: break-word; overflow-wrap: break-word;
  }
  .kjv-text strong { color: #e6edf3; }

  .verse-nav {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #30363d;
    justify-content: space-between;
  }
  .verse-nav a {
    color: #58a6ff; text-decoration: none; font-size: 13px;
    padding: 4px 12px; border: 1px solid #30363d; border-radius: 6px;
  }
  .verse-nav a:hover { background: #1f2937; }

  /* AI Chat */
  .main-layout { display: flex; gap: 16px; align-items: flex-start; margin-top: 16px; }
  .panel-left { flex: 3; min-width: 280px; max-width: 420px; display: none; }
  .panel-center { flex: 5; min-width: 0; }
  .panel-right { flex: 2; min-width: 200px; max-width: 300px; display: none; }

  .chat-section {
    border: 1px solid #30363d; border-radius: 8px;
    padding: 12px; background: #161b22; position: sticky; top: 16px;
  }
  #content { min-width: 0; }
  .commentary-section {
    border: 1px solid #30363d; border-radius: 8px;
    padding: 12px; background: #161b22; position: sticky; top: 16px;
  }
  .commentary-header { color: #58a6ff; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .commentary-placeholder { color: #8b949e; font-size: 13px; text-align: center; padding: 40px 12px; }
  .chat-header { color: #58a6ff; font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .chat-header { color: #58a6ff; font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .chat-messages {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    max-height: 400px; overflow-y: auto; padding: 12px; margin-bottom: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 13px; line-height: 1.5; }
  .chat-msg.user { background: #1f6feb22; align-self: flex-end; border: 1px solid #1f6feb44; }
  .chat-msg.ai { background: #23863622; align-self: flex-start; border: 1px solid #23863644; white-space: pre-wrap; }
  .chat-msg.error { background: #f8514922; align-self: flex-start; border: 1px solid #f8514944; color: #f85149; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #0d1117; color: #e6edf3; font-size: 14px;
  }
  .chat-input-row input:focus { outline: none; border-color: #58a6ff; }
  .chat-input-row button {
    padding: 8px 20px; border-radius: 6px; border: 1px solid #2ea043;
    background: #238636; color: #e6edf3; font-weight: 600; cursor: pointer;
  }
  .chat-input-row button:hover { background: #2ea043; }
  .chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 900px) {
    .main-layout { flex-direction: column; }
    .panel-left, .panel-right { width: 100%; }
    .chat-section, .commentary-section { position: static; }
  }
  @media (max-width: 600px) {
    header .container { flex-direction: column; align-items: stretch; }
    .search-form { flex-wrap: nowrap; }
    .search-form input[name="book"] { flex: 2; }
    .search-form input[name="chapter"] { flex: 1; }
    .search-form input[name="verse"] { flex: 1; }
    .interlinear-table { font-size: 11px; }
    .interlinear-table th { min-width: 40px; padding: 4px; font-size: 10px; }
    .interlinear-table td { padding: 4px; }
    .row-original { font-size: 14px; }
  }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>📖 Interlinear Bible</h1>
    <form class="search-form" id="searchForm">
      <select name="book" required>
        <option value="">— Book —</option>
      </select>
      <select name="chapter" required disabled>
        <option value="">— Ch —</option>
      </select>
      <select name="verse" required disabled>
        <option value="">— Vs —</option>
      </select>
      <span style="color:#8b949e;font-size:13px;align-self:center;">–</span>
      <select name="verseEnd" disabled>
        <option value="">— to —</option>
      </select>
      <button type="submit">Search</button>
    </form>
  </div>
</header>

<div class="main-layout">
<div class="panel-left" id="panelLeft">
<div class="chat-section" id="chatSection">
  <div class="chat-header">💬 Asisten Studi Alkitab AI</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row" style="margin-bottom:8px">
    <input type="text" id="chatInput" placeholder="Ajukan pertanyaan tentang bagian ini..." autocomplete="off">
    <button id="chatSendBtn">Tanya</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <label style="color:#8b949e;font-size:12px">Model:</label>
    <select id="modelSelect" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px">
    </select>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
    <label style="color:#8b949e;font-size:12px">Bahasa:</label>
    <select id="langSelect" style="flex:1;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px">
      <option value="id">Indonesia (TB)</option>
      <option value="en">English (KJV)</option>
    </select>
  </div>
</div>
</div>
<div class="panel-center">
<div class="container" id="content">
  <div class="loading">Pilih bagian di atas untuk melihat data interlinear</div>
</div>
</div>
<div class="panel-right" id="panelRight">
<div class="commentary-section">
  <div class="commentary-header">📜 Commentary</div>
  <div class="commentary-placeholder">Select a passage to view commentary</div>
</div>
</div>
</div>

<script>
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

const content = $('#content');
const panelLeft = $('#panelLeft');
const panelRight = $('#panelRight');

async function loadPassage(book, chapter, verse) {
  content.innerHTML = '<div class="loading">Loading...</div>';
  panelLeft.style.display = 'none';
  panelRight.style.display = 'none';
  try {
    const version = langSelect ? langSelect.value === 'en' ? 'kjv' : 'tb' : 'tb';
    const r = await fetch(`/api/query?book=${encodeURIComponent(book)}&chapter=${chapter}&verse=${encodeURIComponent(verse)}&version=${version}`);
    if (!r.ok) {
      const err = await r.json();
      content.innerHTML = `<div class="error">${err.error || r.statusText}</div>`;
      return;
    }
    const data = await r.json();
    renderPassage(data);
    panelLeft.style.display = 'block';
    panelRight.style.display = 'block';
  } catch (e) {
    content.innerHTML = `<div class="error">Network error: ${e.message}</div>`;
  }
}

function renderPassage(data) {
  let html = '';
  for (const v of data.verses) {
    const isGreek = v.language === 'Greek';
    const interlinear = v.interlinear;
    if (!interlinear || interlinear.length === 0) {
      html += `<div class="verse-card"><div class="verse-header"><span class="verse-ref">${v.reference}</span></div><div class="kjv-text">${v.text || '(No data)'}</div></div>`;
      continue;
    }

    const origClass = isGreek ? 'greek' : 'hebrew';

    html += `<div class="verse-card">
      <div class="verse-header">
        <span class="verse-ref">${v.reference}</span>
        <span class="verse-lang">${v.language} — Strong's</span>
      <div class="interlinear-table-wrapper"><table class="interlinear-table">
        <thead><tr>`;
    for (const w of interlinear) {
      html += `<th>${w.strong}</th>`;
    }
    html += `</tr></thead><tbody>`;

    if (isGreek) {
      // Transliteration row
      html += `<tr class="row-translit">`;
      for (const w of interlinear) {
        html += `<td>${w.transliteration || ''}</td>`;
      }
      html += `</tr>`;
    }

    // Original language row
    html += `<tr class="row-original ${origClass}">`;
    for (const w of interlinear) {
      html += `<td>${w.original}</td>`;
    }
    html += `</tr>`;

    // Gloss row
    html += `<tr class="row-gloss">`;
    for (const w of interlinear) {
      html += `<td>${w.gloss || ''}</td>`;
    }
    html += `</tr>`;

    if (isGreek) {
      // Grammar row
      html += `<tr class="row-grammar">`;
      for (const w of interlinear) {
        html += `<td>${w.grammar || ''}</td>`;
      }
      html += `</tr>`;
    }

    html += `</tbody></table></div>`;

    if (v.text) {
      const vlabel = langSelect && langSelect.value === 'en' ? 'KJV:' : 'TB:';
      html += `<div class="kjv-text"><strong>${vlabel}</strong> ${v.text}</div>`;
    }

    // Verse navigation
    html += `<div class="verse-nav">
      <div>`;
    if (v.verse > 1) {
      const prevVerse = v.verse - 1;
      html += `<a href="#" onclick="event.preventDefault(); searchFromLink('${data.book}', ${data.chapter}, ${prevVerse})">◀ Prev</a>`;
    }
    html += `</div><div>`;
    if (v.verse < 150) {
      const nextVerse = v.verse + 1;
      html += `<a href="#" onclick="event.preventDefault(); searchFromLink('${data.book}', ${data.chapter}, ${nextVerse})">Next ▶</a>`;
    }
    html += `</div></div></div>`;
  }
  content.innerHTML = html;
}

function searchFromLink(book, chapter, verse) {
  const parts = String(verse).split('-');
  const start = parts[0];
  const end = parts[1] || '';
  bookSel.value = book;
  loadChapters(book).then(() => {
    chSel.value = chapter;
    loadVerses(book, chapter).then(() => {
      vsSel.value = start;
      if (end) {
        populateEndVerses(start);
        vsEndSel.value = end;
      }
      loadPassage(book, chapter, verseRange());
    });
  });
}

const bookSel = $('select[name="book"]');
const chSel = $('select[name="chapter"]');
const vsSel = $('select[name="verse"]');
const vsEndSel = $('select[name="verseEnd"]');

function verseRange() {
  const s = vsSel.value;
  const e = vsEndSel.value;
  if (!s) return '';
  if (!e || e === s) return s;
  return `${s}-${e}`;
}

function clearSelect(sel, placeholder) {
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  sel.disabled = true;
}

function populateSelect(sel, items, placeholder) {
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  for (const v of items) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  }
  sel.disabled = false;
}

async function loadChapters(book) {
  clearSelect(chSel, '— Ch —');
  clearSelect(vsSel, '— Vs —');
  if (!book) return;
  try {
    const r = await fetch(`/api/chapters?book=${encodeURIComponent(book)}`);
    const chs = await r.json();
    populateSelect(chSel, chs, '— Ch —');
  } catch {}
}

async function loadVerses(book, chapter) {
  clearSelect(vsSel, '— Vs —');
  clearSelect(vsEndSel, '— to —');
  if (!book || !chapter) return;
  try {
    const r = await fetch(`/api/verses?book=${encodeURIComponent(book)}&chapter=${chapter}`);
    const vs = await r.json();
    populateSelect(vsSel, vs, '— Vs —');
    populateSelect(vsEndSel, vs, '— to —');
  } catch {}
}

function populateEndVerses(start) {
  const vs = [...vsSel.options].map(o => o.value).filter(v => v);
  vsEndSel.innerHTML = `<option value="">— to —</option>`;
  let found = false;
  for (const v of vs) {
    if (!v) continue;
    if (parseInt(v) >= parseInt(start)) {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      vsEndSel.appendChild(opt);
      if (!found && v === start) found = true;
    }
  }
}

bookSel.addEventListener('change', () => loadChapters(bookSel.value));
chSel.addEventListener('change', () => loadVerses(bookSel.value, chSel.value));
vsSel.addEventListener('change', () => {
  if (!vsSel.value) return;
  populateEndVerses(vsSel.value);
  // Don't auto-submit yet — let user pick end verse
});
vsEndSel.addEventListener('change', () => {
  if (bookSel.value && chSel.value && vsSel.value) {
    loadPassage(bookSel.value, chSel.value, verseRange());
  }
});

async function loadModels() {
  try {
    const r = await fetch('/api/models');
    const models = await r.json();
    modelSelect.innerHTML = '';
    for (const m of models) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      if (m === 'llama3.1:8b' || m.includes('llama3.1')) opt.selected = true;
      modelSelect.appendChild(opt);
    }
  } catch {}
}

const CANONICAL_OT = ["Gen","Exod","Lev","Num","Deut","Josh","Judg","Ruth","1Sam","2Sam","1Kgs","2Kgs","1Chr","2Chr","Ezra","Neh","Esth","Job","Ps","Prov","Eccl","Song","Isa","Jer","Lam","Ezek","Dan","Hos","Joel","Amos","Obad","Jonah","Mic","Nah","Hab","Zeph","Hag","Zech","Mal"];
const CANONICAL_NT = ["Matt","Mark","Luke","John","Acts","Rom","1Cor","2Cor","Gal","Eph","Phil","Col","1Thess","2Thess","1Tim","2Tim","Titus","Phlm","Heb","Jas","1Pet","2Pet","1John","2John","3John","Jude","Rev"];

async function init() {
  try {
    const r = await fetch('/api/books');
    const allBooks = await r.json();
    const avail = new Set(allBooks);

    function addGroup(label, books, klass) {
      const g = document.createElement('optgroup');
      g.label = label;
      for (const b of books) {
        if (!avail.has(b)) continue;
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        opt.className = klass;
        if (b === 'Eph') opt.selected = true;
        g.appendChild(opt);
      }
      bookSel.appendChild(g);
    }

    addGroup('— Old Testament —', CANONICAL_OT, 'ot-book');
    addGroup('— New Testament —', CANONICAL_NT, 'nt-book');
  } catch {}
  loadModels();
  await loadChapters('Eph');
  await loadVerses('Eph', 5);
  vsSel.value = '22';
  populateEndVerses('22');
  vsEndSel.value = '24';
  loadPassage('Eph', 5, '22-24');
}

// --- AI Chat ---
const chatSection = $('#chatSection');
const chatMessages = $('#chatMessages');
const chatInput = $('#chatInput');
const chatSendBtn = $('#chatSendBtn');
const modelSelect = $('#modelSelect');
const langSelect = $('#langSelect');

function getCurrentPassageText() {
  const cards = $$('.verse-card');
  return cards.map(c => {
    const ref = c.querySelector('.verse-ref');
    const text = c.querySelector('.kjv-text');
    return ref ? `${ref.textContent}: ${text ? text.textContent.replace('KJV:', '').trim() : ''}` : '';
  }).filter(Boolean).join('\n');
}

async function sendChatMessage() {
  const question = chatInput.value.trim();
  if (!question) return;
  chatInput.value = '';
  addChatMessage('user', question);
  chatSendBtn.disabled = true;
  chatSendBtn.textContent = '...';
  try {
    // First: check admin references
    const refR = await fetch('/api/references/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question}),
    });
    const refData = await refR.json();

    if (refData.matched && refData.ref) {
      const ref = refData.ref;
      addChatMessage('ai', ref.answer);
      // Load referenced verses if book is set
      if (ref.book) {
        const ch = ref.chapter || 1;
        const vs = ref.verse_start || 1;
        const ve = ref.verse_end || vs;
        await loadPassage(ref.book, ch, vs === ve ? `${vs}` : `${vs}-${ve}`);
      }
    } else {
      // Fallback: ask ollama
      const context = getCurrentPassageText();
      const model = modelSelect.value || 'llama3.1:8b';
      const lang = langSelect ? langSelect.value : 'id';
      const r = await fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question, context, model, lang}),
      });
      const data = await r.json();
      if (data.answer && data.answer.includes('does not support image')) {
        addChatMessage('error', 'This model only supports text. Please enter a text question, not an image.');
      } else {
        addChatMessage('ai', data.answer || 'No response');
      }
    }
  } catch (e) {
    addChatMessage('error', `Error: ${e.message}`);
  }
  chatSendBtn.disabled = false;
  chatSendBtn.textContent = 'Tanya';
}

function addChatMessage(role, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  if (role === 'ai') {
    div.innerHTML = linkifyVerses(escHtml(text));
  } else {
    div.textContent = text;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const BOOK_NAME_MAP = {
  "genesis":"Gen","gen":"Gen","ge":"Gen",
  "exodus":"Exod","exo":"Exod","exod":"Exod","ex":"Exod",
  "leviticus":"Lev","lev":"Lev","le":"Lev",
  "numbers":"Num","num":"Num","nu":"Num",
  "deuteronomy":"Deut","deut":"Deut","deu":"Deut","de":"Deut",
    "joshua":"Josh","josh":"Josh","jos":"Josh",
    "kejadian":"Gen","kej":"Gen","keluaran":"Exod","kel":"Exod",
    "imamat":"Lev","ima":"Lev","bilangan":"Num","bil":"Num",
    "ulangan":"Deut","ula":"Deut","yoshua":"Josh","yosh":"Josh",
    "hakim-hakim":"Judg","hakim":"Judg","hak":"Judg",
    "rut":"Ruth","ruth":"Ruth",
    "1 samuel":"1Sam","1sam":"1Sam","1samuel":"1Sam",
    "2 samuel":"2Sam","2sam":"2Sam","2samuel":"2Sam",
    "1 raja-raja":"1Kgs","1raja":"1Kgs","1raj":"1Kgs",
    "2 raja-raja":"2Kgs","2raja":"2Kgs","2raj":"2Kgs",
    "1 tawarikh":"1Chr","1taw":"1Chr","1tawarikh":"1Chr",
    "2 tawarikh":"2Chr","2taw":"2Chr","2tawarikh":"2Chr",
    "ezra":"Ezra","ezr":"Ezra","nehemia":"Neh","neh":"Neh",

function linkifyVerses(text) {
  // Match patterns like "Book Chapter:Verse" or "Book Chapter:Verse-Verse"
  return text.replace(/\b((?:[12]\s+)?(?:[A-Za-z]{3,}\s+){0,2}[A-Za-z]{3,}(?:\s*\.)?)\s*(\d+):(\d+)(?:\s*[-–]\s*(\d+))?\b/g, (match, bookRaw, ch, vs, vsEnd) => {
    const key = bookRaw.replace(/\./g, '').trim().toLowerCase();
    const code = BOOK_NAME_MAP[key];
    if (!code) return match;
    const href = `javascript:searchFromLink('${code}',${ch},'${vs}${vsEnd ? '-'+vsEnd : ''}')`;
    return `<a href="${href}" style="color:#58a6ff;text-decoration:underline;cursor:pointer">${match}</a>`;
  });
}
